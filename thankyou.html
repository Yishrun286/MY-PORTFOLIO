<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success | Jesh Projects</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Outfit:wght@900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .message-box {
            padding: 40px;
            border: 1px solid #00D9C0;
            border-radius: 15px;
            background: rgba(0, 217, 192, 0.05);
        }
        h1 { font-family: 'Outfit', sans-serif; color: #00D9C0; font-size: 3rem; margin-bottom: 10px; }
        p { color: #8892b0; margin-bottom: 30px; }
        .btn {
            padding: 12px 25px;
            background-color: #00D9C0;
            color: #121212;
            text-decoration: none;
            font-weight: 700;
            border-radius: 5px;
            transition: 0.3s;
        }
        .btn:hover { background-color: #8C52FF; color: white; }
    </style>
</head>
<body>
    <div class="message-box">
        <h1>DONE!</h1>
        <p>Your request has been sent successfully.<br>I will get back to you in your Gmail shortly.</p>
        <a href="index.html" class="btn">Back to Home</a>
    </div>
</body>
</html>
